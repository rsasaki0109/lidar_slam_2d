<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">lidar_slam_2d benchmark summary</title><desc id="desc">A public benchmark summary comparing reference trajectories against lidar_slam_2d results across backpack and IILABS datasets.</desc><defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0b1220"/><stop offset="100%" stop-color="#111827"/></linearGradient></defs><rect width="100%" height="100%" fill="url(#bg)"/><text x="60" y="78" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700" fill="#f8fafc">lidar_slam_2d benchmark summary</text><text x="60" y="116" font-size="20" font-family="Inter,Arial,sans-serif" fill="#cbd5e1">Lower align RMSE is better. Backpack numbers use Cartographer pseudo GT; IILABS uses provided ground truth.</text><rect x="60" y="170" rx="28" ry="28" width="520" height="240" fill="#0f172a" stroke="#1e293b" stroke-width="2"/><text x="88" y="214" font-size="26" font-family="Inter,Arial,sans-serif" font-weight="700" fill="#f8fafc">Backpack 300 scans</text><rect x="88" y="230" rx="16" ry="16" width="140" height="32" fill="#0f766e"/><text x="158" y="252" text-anchor="middle" font-size="16" font-family="Inter,Arial,sans-serif" font-weight="700" fill="#ecfeff">19.8x lower</text><text x="88" y="300" font-size="18" font-family="Inter,Arial,sans-serif" fill="#94a3b8">bench_fast</text><text x="88" y="345" font-size="38" font-family="Inter,Arial,sans-serif" font-weight="700" fill="#e2e8f0">1.593 m</text><text x="340" y="300" font-size="18" font-family="Inter,Arial,sans-serif" fill="#7dd3fc">lidar_slam_2d parity</text><text x="340" y="345" font-size="38" font-family="Inter,Arial,sans-serif" font-weight="700" fill="#60a5fa">0.081 m</text><line x1="302" y1="288" x2="302" y2="362" stroke="#1e293b" stroke-width="2"/><rect x="620" y="170" rx="28" ry="28" width="520" height="240" fill="#0f172a" stroke="#1e293b" stroke-width="2"/><text x="648" y="214" font-size="26" font-family="Inter,Arial,sans-serif" font-weight="700" fill="#f8fafc">Backpack 2k scans</text><rect x="648" y="230" rx="16" ry="16" width="140" height="32" fill="#0f766e"/><text x="718" y="252" text-anchor="middle" font-size="16" font-family="Inter,Arial,sans-serif" font-weight="700" fill="#ecfeff">16.2x lower</text><text x="648" y="300" font-size="18" font-family="Inter,Arial,sans-serif" fill="#94a3b8">bench_fast</text><text x="648" y="345" font-size="38" font-family="Inter,Arial,sans-serif" font-weight="700" fill="#e2e8f0">7.693 m</text><text x="900" y="300" font-size="18" font-family="Inter,Arial,sans-serif" fill="#7dd3fc">lidar_slam_2d parity</text><text x="900" y="345" font-size="38" font-family="Inter,Arial,sans-serif" font-weight="700" fill="#60a5fa">0.475 m</text><line x1="862" y1="288" x2="862" y2="362" stroke="#1e293b" stroke-width="2"/><rect x="60" y="442" rx="28" ry="28" width="520" height="240" fill="#0f172a" stroke="#1e293b" stroke-width="2"/><text x="88" y="486" font-size="26" font-family="Inter,Arial,sans-serif" font-weight="700" fill="#f8fafc">IILABS loop 2k</text><rect x="88" y="502" rx="16" ry="16" width="140" height="32" fill="#0f766e"/><text x="158" y="524" text-anchor="middle" font-size="16" font-family="Inter,Arial,sans-serif" font-weight="700" fill="#ecfeff">2.4x lower</text><text x="88" y="572" font-size="18" font-family="Inter,Arial,sans-serif" fill="#94a3b8">Cartographer sampled</text><text x="88" y="617" font-size="38" font-family="Inter,Arial,sans-serif" font-weight="700" fill="#e2e8f0">0.244 m</text><text x="340" y="572" font-size="18" font-family="Inter,Arial,sans-serif" fill="#7dd3fc">lidar_slam_2d vscan+BB</text><text x="340" y="617" font-size="38" font-family="Inter,Arial,sans-serif" font-weight="700" fill="#60a5fa">0.101 m</text><line x1="302" y1="560" x2="302" y2="634" stroke="#1e293b" stroke-width="2"/><rect x="620" y="442" rx="28" ry="28" width="520" height="240" fill="#0f172a" stroke="#1e293b" stroke-width="2"/><text x="648" y="486" font-size="26" font-family="Inter,Arial,sans-serif" font-weight="700" fill="#f8fafc">IILABS slippage full</text><rect x="648" y="502" rx="16" ry="16" width="140" height="32" fill="#0f766e"/><text x="718" y="524" text-anchor="middle" font-size="16" font-family="Inter,Arial,sans-serif" font-weight="700" fill="#ecfeff">4.8x lower</text><text x="648" y="572" font-size="18" font-family="Inter,Arial,sans-serif" fill="#94a3b8">Cartographer sampled</text><text x="648" y="617" font-size="38" font-family="Inter,Arial,sans-serif" font-weight="700" fill="#e2e8f0">0.367 m</text><text x="900" y="572" font-size="18" font-family="Inter,Arial,sans-serif" fill="#7dd3fc">lidar_slam_2d vscan+BB</text><text x="900" y="617" font-size="38" font-family="Inter,Arial,sans-serif" font-weight="700" fill="#60a5fa">0.076 m</text><line x1="862" y1="560" x2="862" y2="634" stroke="#1e293b" stroke-width="2"/></svg>
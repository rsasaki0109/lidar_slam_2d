# Cartographer-reference local/map params + long-run pose-graph guards (see bench_backpack_full).
# Use for full b0 bag when you want "ported" scan/grid numbers but tractable wall time.
slam:
  preprocess:
    max_range: 30.0
    stride: 4
  local_matching:
    type: correlative
    correlative_grid:
      linear_step_m: 0.05
      angular_step_deg: 2.0
      linear_window_m: 0.1
      angular_window_deg: 20.0
      sigma_hit_m: 0.15
  submap:
    max_submap_scans: 40
    downsample_stride: 2
  optimize_every_n_keyframes: 90
  optimize_adaptive_from_node: 1800
  optimize_min_interval_for_long_runs: 280
  pose_graph_skip_optimization_from_node: 2600
  pose_graph:
    max_iterations: 50
    max_nfev_cap: 40000
  loop_detection:
    enabled: false

map:
  occupancy_grid:
    resolution_m: 0.05
    size_x_m: 60.0
    size_y_m: 60.0
    origin_x_m: -30.0
    origin_y_m: -30.0

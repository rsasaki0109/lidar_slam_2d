slam:
  preprocess:
    max_range: 10.0
    stride: 4
  local_matching:
    type: correlative
    correlative_grid:
      linear_step_m: 0.05
      angular_step_deg: 2.0
      linear_window_m: 0.10
      angular_window_deg: 15.0
      sigma_hit_m: 0.10
  submap:
    max_submap_scans: 25
    downsample_stride: 2
  optimize_every_n_keyframes: 90
  loop_detection:
    enabled: false
  pose_graph:
    max_iterations: 35
    max_nfev_cap: 50000

map:
  occupancy_grid:
    resolution_m: 0.05
    size_x_m: 60.0
    size_y_m: 60.0
    origin_x_m: -30.0
    origin_y_m: -30.0

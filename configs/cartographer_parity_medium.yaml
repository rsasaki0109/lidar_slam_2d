# Maintained Cartographer-parity working config for short/medium offline runs (≈300–2000 scans).
# This is not the exact reproduction of the best recorded 300-scan or 2k benchmark runs.
# Use `cartographer_parity_medium_s300_locked.yaml` or `cartographer_parity_noloop_s2k.yaml`
# when reproducibility of those measured results matters more than ongoing iteration.
slam:
  preprocess:
    max_range: 30.0
    stride: 4
  local_matching:
    type: correlative
    correlative_grid:
      linear_step_m: 0.05
      angular_step_deg: 2.0
      linear_window_m: 0.1
      angular_window_deg: 20.0
      sigma_hit_m: 0.15
  submap:
    max_submap_scans: 40
    downsample_stride: 2
  optimize_every_n_keyframes: 90
  loop_detection:
    enabled: true
    search_radius_m: 4.0
    min_separation_nodes: 100
    max_candidates: 4
    accept_score: -3.0
    icp_accept_rms: 0.10
    correlative_grid:
      linear_step_m: 0.05
      angular_step_deg: 2.0
      linear_window_m: 0.5
      angular_window_deg: 30.0
      sigma_hit_m: 0.25
    # Keep loop refinement tighter than the generic local ICP defaults.
    icp:
      max_iterations: 15
      max_correspondence_dist_m: 1.0
      min_correspondences: 30
      trim_fraction: 0.15
  pose_graph:
    max_iterations: 50
    max_nfev_cap: 200000

map:
  occupancy_grid:
    resolution_m: 0.05
    size_x_m: 60.0
    size_y_m: 60.0
    origin_x_m: -30.0
    origin_y_m: -30.0

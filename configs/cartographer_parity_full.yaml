# Deprecated exploratory full-bag parity config.
# The old sliding-window pose-graph path has been removed from the codebase, so the historical
# `optimization_window` knob is intentionally gone here. Use `bench_backpack_full.yaml` for the
# maintained full-bag path, or the locked parity configs for benchmark-faithful 300/2k reruns.
slam:
  preprocess:
    max_range: 30.0
    stride: 4
  local_matching:
    type: correlative
    correlative_grid:
      linear_step_m: 0.05
      angular_step_deg: 2.0
      linear_window_m: 0.1
      angular_window_deg: 20.0
      sigma_hit_m: 0.15
  submap:
    max_submap_scans: 40
    downsample_stride: 2
  optimize_every_n_keyframes: 45
  loop_detection:
    enabled: true
    search_radius_m: 2.5
    min_separation_nodes: 45
    max_candidates: 4
    accept_score: -0.28
    icp_accept_rms: 0.10
    icp:
      max_iterations: 15
      max_correspondence_dist_m: 1.0
      min_correspondences: 30
      trim_fraction: 0.15
  pose_graph:
    max_iterations: 45
    max_nfev_cap: 72000

map:
  occupancy_grid:
    resolution_m: 0.05
    size_x_m: 60.0
    size_y_m: 60.0
    origin_x_m: -30.0
    origin_y_m: -30.0

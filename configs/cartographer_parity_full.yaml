# B: full backpack_2d bag — same local/loop intent as parity_medium, but sliding-window BA
# so each solve touches only the last N poses (prefix frozen). No global BA skip.
# Tune optimization_window / optimize_every_n_keyframes for wall-time vs drift tradeoff.
slam:
  preprocess:
    max_range: 30.0
    stride: 4
  local_matching:
    type: correlative
    correlative_grid:
      linear_step_m: 0.05
      angular_step_deg: 2.0
      linear_window_m: 0.1
      angular_window_deg: 20.0
      sigma_hit_m: 0.15
  submap:
    max_submap_scans: 40
    downsample_stride: 2
  optimize_every_n_keyframes: 45
  loop_detection:
    enabled: true
    search_radius_m: 2.5
    min_separation_nodes: 45
    max_candidates: 4
    accept_score: -0.28
  pose_graph:
    max_iterations: 45
    max_nfev_cap: 72000
    optimization_window: 360

map:
  occupancy_grid:
    resolution_m: 0.05
    size_x_m: 60.0
    size_y_m: 60.0
    origin_x_m: -30.0
    origin_y_m: -30.0

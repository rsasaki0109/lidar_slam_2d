slam:
  virtual_scan:
    z_min: -0.05
    z_max: 0.15
    angular_resolution_deg: 0.25
    max_range: 8.0
  preprocess:
    max_range: 8.0
    stride: 1
  local_matching:
    type: hybrid
    correlative_grid:
      linear_step_m: 0.02
      angular_step_deg: 0.5
      linear_window_m: 0.05
      angular_window_deg: 8.0
      sigma_hit_m: 0.06
    icp:
      max_iterations: 15
      max_correspondence_dist_m: 0.75
      min_correspondences: 60
      trim_fraction: 0.10
  prediction:
    mode: constant_velocity
    gain: 1.0
  submap:
    max_submap_scans: 30
    downsample_stride: 1
  optimize_every_n_keyframes: 25
  loop_detection:
    enabled: false
  pose_graph:
    max_iterations: 45
    max_nfev_cap: 120000

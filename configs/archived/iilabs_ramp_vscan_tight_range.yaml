slam:
  virtual_scan:
    z_min: -0.1
    z_max: 0.3
    angular_resolution_deg: 0.5
    max_range: 6.0
  preprocess:
    max_range: 6.0
    stride: 1
  local_matching:
    type: hybrid
    correlative_grid:
      linear_step_m: 0.025
      angular_step_deg: 1.0
      linear_window_m: 0.05
      angular_window_deg: 8.0
      sigma_hit_m: 0.08
    icp:
      max_iterations: 12
      max_correspondence_dist_m: 0.60
      min_correspondences: 40
      trim_fraction: 0.15
  prediction:
    mode: constant_velocity
    gain: 1.0
  submap:
    max_submap_scans: 25
    downsample_stride: 1
  optimize_every_n_keyframes: 20
  loop_detection:
    enabled: false
  pose_graph:
    max_iterations: 45
    max_nfev_cap: 120000

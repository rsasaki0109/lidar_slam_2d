# Full backpack_2d bag (~5.5k horizontal scans): cap pose-graph solver work per step so replay finishes.
# Same local pipeline as bench_fast; longer optimize interval + scipy max_nfev cap.
slam:
  preprocess:
    max_range: 20.0
    stride: 8
  local_matching:
    type: icp
    icp:
      max_iterations: 5
      max_correspondence_dist_m: 1.0
      min_correspondences: 20
      trim_fraction: 0.2
  submap:
    max_submap_scans: 10
    downsample_stride: 4
  optimize_every_n_keyframes: 80
  optimize_adaptive_from_node: 1800
  optimize_min_interval_for_long_runs: 280
  # Global bundle adjustment on ~5000 2D poses dominates wall time; skip after this node index.
  pose_graph_skip_optimization_from_node: 2600
  pose_graph:
    max_iterations: 50
    max_nfev_cap: 40000
  loop_detection:
    enabled: false

map:
  occupancy_grid:
    resolution_m: 0.1
    size_x_m: 60.0
    size_y_m: 60.0
    origin_x_m: -30.0
    origin_y_m: -30.0
